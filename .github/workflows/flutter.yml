name: Flutter CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.0'
        channel: 'stable'
        cache: true
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Check formatting
      run: dart format --set-exit-if-changed .
    
    - name: Run linter
      run: flutter analyze --no-fatal-warnings
    
    - name: Run tests
      run: flutter test --coverage
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: coverage/lcov.info

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.0'
        channel: 'stable'
        cache: true
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Build APK (Development)
      run: |
        flutter build apk --release \
          --dart-define=HUME_API_KEY=${{ secrets.HUME_API_KEY }} \
          --dart-define=HUME_CONFIG_ID=${{ secrets.HUME_CONFIG_ID }} \
          --dart-define=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
          --dart-define=HUME_API_BASE_URL=${{ secrets.HUME_API_BASE_URL }} \
          --dart-define=OPENAI_API_BASE_URL=${{ secrets.OPENAI_API_BASE_URL }} \
          --dart-define=OPENAI_MODEL=${{ secrets.OPENAI_MODEL }} \
          --dart-define=AUDIO_SAMPLE_RATE=${{ secrets.AUDIO_SAMPLE_RATE }} \
          --dart-define=AUDIO_ENCODING=${{ secrets.AUDIO_ENCODING }} \
          --dart-name=eko-dev.apk
    
    - name: Build iOS (Development)
      if: runner.os == 'macOS'
      run: |
        flutter build ios --release --no-codesign \
          --dart-define=HUME_API_KEY=${{ secrets.HUME_API_KEY }} \
          --dart-define=HUME_CONFIG_ID=${{ secrets.HUME_CONFIG_ID }} \
          --dart-define=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
          --dart-define=HUME_API_BASE_URL=${{ secrets.HUME_API_BASE_URL }} \
          --dart-define=OPENAI_API_BASE_URL=${{ secrets.OPENAI_API_BASE_URL }} \
          --dart-define=OPENAI_MODEL=${{ secrets.OPENAI_MODEL }} \
          --dart-define=AUDIO_SAMPLE_RATE=${{ secrets.AUDIO_SAMPLE_RATE }} \
          --dart-define=AUDIO_ENCODING=${{ secrets.AUDIO_ENCODING }}
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-artifacts
        path: |
          build/app/outputs/flutter-apk/*.apk
          build/ios/build/Release-iphoneos/*.ipa

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to Firebase App Distribution
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: ${{ secrets.FIREBASE_APP_ID }}
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
        groups: testers
        file: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk