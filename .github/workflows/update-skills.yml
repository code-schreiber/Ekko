name: Weekly Skill Update

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for skill changes
        id: check
        run: |
          if git diff --quiet HEAD -- .opencode/skills/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update opencode flutter skill"
          branch: "chore/update-skills"
          title: "chore: update opencode flutter skill"
          body: |
            Weekly automated PR to review and update the opencode Flutter skill.

            ## Checklist
            - [ ] Review `.opencode/skills/flutter/SKILL.md` for accuracy
            - [ ] Update architecture descriptions if patterns changed
            - [ ] Add new key files or directories
            - [ ] Update test commands if needed
            - [ ] Document any new conventions
          delete-branch: true
